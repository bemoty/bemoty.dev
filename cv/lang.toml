entry-1.en = "Progressed from volunteer developer (2018) to lead software engineer (2021), leading technical development across a distributed team of 15+ volunteer developers, overseeing the entire engineering lifecycle from recruitment and onboarding to code reviews and CI/CD pipeline management (GitLab, Nexus)."
entry-1.de = "Aufstieg vom freiwilligen Entwickler (2018) zum leitenden Softwareentwickler (2021), Leitung der technischen Entwicklung in einem verteilten Team von mehr als 15 freiwilligen Entwicklern, Überwachung des gesamten Entwicklungszyklus von der Rekrutierung und Einarbeitung bis hin zu Code-Reviews und CI/CD-Pipeline-Management (GitLab, Nexus)."

entry-2.en = "Oversaw a hybrid infrastructure: a Kubernetes cluster (Rancher, Kustomize) for web services, and a custom Netty-based distributed system for orchestrating game servers supporting 3,000+ concurrent players."
entry-2.de = "Überwachung einer hybriden Infrastruktur: ein Kubernetes-Cluster (Rancher, Kustomize) für Webdienste und ein auf Netty basierendes verteiltes System zur Orchestrierung von Spielservern für mehr als 3.000 gleichzeitige Spieler."

entry-3.en = "Architected \"Guardian,\" a centralized moderation platform built with Next.js and Apollo Federation (GraphQL). The system integrates a cluster of Java microservices to enable game replay analysis and ban appeals for a 50-person moderation team."
entry-3.de = "Entwicklung von „Guardian“, einer zentralisierten Moderationsplattform, die mit Next.js und Apollo Federation (GraphQL) erstellt wurde. Das System integriert einen Cluster von Java-Microservices, um die Bearbeitung von Spielermeldungen für ein 50-köpfiges Moderationsteam zu ermöglichen."

entry-4.en = "Engineered mission-critical tournament infrastructure for live events featuring Germany's largest Twitch streamers, ensuring zero downtime while handling 50,000+ live viewers."
entry-4.de = "Entwicklung einer missionskritischen Turnierinfrastruktur für Live-Events mit Deutschlands größten Twitch-Streamern mit mehr als 50.000 Live-Zuschauern."

