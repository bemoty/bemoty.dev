entry-2.en = "Engineered a communication layer using gRPC to link the Java reasoning service with the core platform."
entry-2.de = "Entwicklung einer Kommunikationsschicht unter Verwendung von gRPC zur Verbindung des Java-Reasoning-Dienstes mit der Kernplattform."

entry-3.en = "Developed a Next.js dashboard for users to manage validation rules and view real-time reasoning results."
entry-3.de = "Entwicklung eines Next.js-Dashboards, über das Benutzer Validierungsregeln verwalten und Echtzeit-Reasoning-Ergebnisse anzeigen können."

